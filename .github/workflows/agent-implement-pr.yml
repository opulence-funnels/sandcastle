name: Agent Implement PR

on:
  pull_request_target:
    types: [labeled]

jobs:
  implement-pr:
    if: github.event.label.name == 'agent:implement'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: agent-mutate-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write

    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      BRANCH: ${{ github.event.pull_request.head.ref }}
      BRANCH_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Refuse closed PR
        if: github.event.pull_request.state != 'open'
        run: |
          gh pr edit "$PR_NUMBER" --remove-label "agent:implement" || true
          gh pr comment "$PR_NUMBER" --body "Refused to run: PR #${PR_NUMBER} is not open."

      - name: Transition labels
        if: github.event.pull_request.state == 'open'
        run: |
          gh pr edit "$PR_NUMBER" --remove-label "agent:implement" || true
          gh pr edit "$PR_NUMBER" --remove-label "agent:blocked" || true
          gh pr edit "$PR_NUMBER" --add-label "agent:in-progress"

      - name: Checkout PR branch
        if: github.event.pull_request.state == 'open'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Prepare branch
        if: github.event.pull_request.state == 'open'
        run: |
          git fetch origin main:main || git fetch origin main
          git checkout "$BRANCH" 2>/dev/null || git checkout -B "$BRANCH"
          git config user.name "sandcastle-agent[bot]"
          git config user.email "sandcastle-agent[bot]@users.noreply.github.com"

      - name: Setup Node.js
        if: github.event.pull_request.state == 'open'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        if: github.event.pull_request.state == 'open'
        run: npm ci

      - name: Install Claude Code
        if: github.event.pull_request.state == 'open'
        run: npm install -g @anthropic-ai/claude-code

      - name: Run implement-PR agent
        if: github.event.pull_request.state == 'open'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          OUTPUT_DIR: ${{ runner.temp }}
        run: npx tsx .sandcastle/agent-workflows/implement-pr/implement-pr.ts

      - name: Push branch
        if: github.event.pull_request.state == 'open' && success()
        run: |
          if [ "$(cat "${RUNNER_TEMP}/has_commits.txt")" != "true" ]; then
            echo "No commits to push."
            exit 0
          fi
          set +e
          git push --force-with-lease="refs/heads/$BRANCH:$BRANCH_HEAD_SHA" origin "$BRANCH" 2> push_err.txt
          status=$?
          set -e
          if [ $status -ne 0 ]; then
            if grep -qiE "non-fast-forward|rejected|fetch first|stale info" push_err.txt; then
              echo "Branch advanced during implement-PR run." > "${RUNNER_TEMP}/failure_reason.txt"
              cat push_err.txt
              exit 1
            fi
            cat push_err.txt
            exit $status
          fi

      - name: Post thread replies
        if: github.event.pull_request.state == 'open' && success()
        env:
          REPLIES: ${{ runner.temp }}/implement_thread_replies.json
        run: |
          count=$(jq 'length' "$REPLIES")
          if [ "$count" -eq 0 ]; then
            exit 0
          fi
          for i in $(seq 0 $((count - 1))); do
            commentId=$(jq -r ".[$i].commentId" "$REPLIES")
            body=$(jq -r ".[$i].body" "$REPLIES")
            rest_id=$(gh api graphql -f query="query(\$id:ID!){ node(id:\$id){ ... on PullRequestReviewComment { databaseId } } }" -F id="$commentId" --jq '.data.node.databaseId')
            if [ -z "$rest_id" ] || [ "$rest_id" = "null" ]; then
              echo "Could not resolve REST id for $commentId; skipping" >&2
              continue
            fi
            gh api --method POST "repos/{owner}/{repo}/pulls/${PR_NUMBER}/comments/${rest_id}/replies" -f body="$body"
          done

      - name: Post inline comments
        if: github.event.pull_request.state == 'open' && success()
        env:
          COMMENTS: ${{ runner.temp }}/implement_new_inline_comments.json
        run: |
          count=$(jq 'length' "$COMMENTS")
          if [ "$count" -eq 0 ]; then
            exit 0
          fi
          head_sha=$(git rev-parse HEAD)
          for i in $(seq 0 $((count - 1))); do
            path=$(jq -r ".[$i].path" "$COMMENTS")
            line=$(jq -r ".[$i].line" "$COMMENTS")
            body=$(jq -r ".[$i].body" "$COMMENTS")
            gh api --method POST "repos/{owner}/{repo}/pulls/${PR_NUMBER}/comments" \
              -f commit_id="$head_sha" \
              -f path="$path" \
              -F line="$line" \
              -f side="RIGHT" \
              -f body="$body"
          done

      - name: Post top-level comments
        if: github.event.pull_request.state == 'open' && success()
        env:
          COMMENTS: ${{ runner.temp }}/implement_top_level_comments.json
        run: |
          count=$(jq 'length' "$COMMENTS")
          if [ "$count" -eq 0 ]; then
            exit 0
          fi
          for i in $(seq 0 $((count - 1))); do
            body=$(jq -r ".[$i].body" "$COMMENTS")
            gh pr comment "$PR_NUMBER" --body "$body"
          done

      - name: Mark blocked on failure
        if: github.event.pull_request.state == 'open' && failure()
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          reason="(no reason file written; check workflow logs)"
          if [ -f "${RUNNER_TEMP}/failure_reason.txt" ]; then
            reason=$(cat "${RUNNER_TEMP}/failure_reason.txt")
          fi
          body_file="${RUNNER_TEMP}/failure-comment.md"
          printf '`agent:implement` PR run failed.\n\n**Reason:** %s\n\n**Workflow run:** %s\n\nRe-add `agent:implement` to retry.\n' "$reason" "$RUN_URL" > "$body_file"
          gh pr edit "$PR_NUMBER" --add-label "agent:blocked" || true
          gh pr comment "$PR_NUMBER" --body-file "$body_file"

      - name: Always remove in-progress
        if: always() && github.event.pull_request.state == 'open'
        run: gh pr edit "$PR_NUMBER" --remove-label "agent:in-progress" || true
